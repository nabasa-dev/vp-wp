name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

env:
  CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "7.4"
          - "8.3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Lint PHP runtime
        run: php -l "vp-wp.php"

  javascript:
    name: Node 22
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test run

      - name: Build package
        run: vp pack

  preview:
    name: pkg.pr.new Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - javascript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build package
        run: vp pack

      - name: Publish preview package
        run: vp dlx pkg-pr-new publish --packageManager=pnpm
